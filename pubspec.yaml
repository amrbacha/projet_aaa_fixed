name: projet_aaa
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_compass: ^0.8.0
  geolocator: ^10.1.0
  geocoding: ^2.2.0
  go_router: ^13.0.0
  provider: ^6.0.5
